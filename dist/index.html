<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <title>Team Farmii</title>
  <style>
    :root {
      --primary-green: #2d5016;
      --accent-green: #4a7c2c;
      --light-green: #f0f7f0;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f6f7f5;
    }
  </style>
</head>
<body>
  <main class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-2xl bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
      <div class="flex items-start justify-between gap-6">
        <div>
          <h1 class="text-2xl sm:text-3xl font-black text-[color:var(--primary-green)] tracking-tight">Team Farmii（チームファーミー）</h1>
          <p class="text-sm sm:text-base text-gray-700 mt-2">農業の意思決定をデータで支える</p>
        </div>
        <div class="text-right">
          <div class="text-[11px] text-gray-500">Contact</div>
          <div class="text-sm font-bold text-[color:var(--primary-green)]">rowsey@g.ecc.u-tokyo.ac.jp</div>
        </div>
      </div>

      <div class="mt-6">
        <h2 class="text-sm font-bold text-gray-700">Members</h2>
        <p class="text-sm text-gray-600 mt-1">メンバーバルチ / メンバーバル</p>
      </div>

      <div class="mt-8 flex flex-col sm:flex-row items-start sm:items-center gap-3">
        <a href="./lp/index.html" class="inline-flex items-center justify-center rounded-lg bg-[color:var(--primary-green)] text-white px-5 py-2.5 text-sm font-bold shadow">
          LPはこちら
        </a>
        <span class="text-xs text-gray-500">最新LPはここから確認できます</span>
      </div>
    </div>
  </main>
</body>
</html>
